<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 480" width="1280" height="480" role="img" aria-label="Frontend Design Research">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e0c"/>
      <stop offset="100%" stop-color="#050606"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#2a3a32" opacity="0.5"/>
    </pattern>
  </defs>

  <!-- 背景 -->
  <rect width="1280" height="480" fill="url(#bg)"/>
  <rect width="1280" height="480" fill="url(#dots)"/>

  <!-- 左侧：5 个反陷阱色块（横排，最后一个是单色"正确"绿） -->
  <g transform="translate(80, 320)">
    <!-- 紫色调（禁用） -->
    <rect x="0" y="0" width="60" height="60" fill="#6366f1" opacity="0.35"/>
    <line x1="0" y1="60" x2="60" y2="0" stroke="#ef4444" stroke-width="2" opacity="0.7"/>

    <!-- mesh gradient（禁用） -->
    <rect x="80" y="0" width="60" height="60" fill="url(#mesh)" opacity="0.3"/>
    <defs>
      <linearGradient id="mesh" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#a855f7"/>
        <stop offset="50%" stop-color="#ec4899"/>
        <stop offset="100%" stop-color="#3b82f6"/>
      </linearGradient>
    </defs>
    <line x1="80" y1="60" x2="140" y2="0" stroke="#ef4444" stroke-width="2" opacity="0.7"/>

    <!-- 文化主题（禁用） -->
    <rect x="160" y="0" width="60" height="60" fill="#8b0000" opacity="0.4"/>
    <text x="190" y="38" font-family="serif" font-size="32" fill="#d4af37" text-anchor="middle" opacity="0.6">墨</text>
    <line x1="160" y1="60" x2="220" y2="0" stroke="#ef4444" stroke-width="2" opacity="0.7"/>

    <!-- mascot（禁用） -->
    <circle cx="270" cy="30" r="28" fill="#f59e0b" opacity="0.4"/>
    <line x1="240" y1="60" x2="300" y2="0" stroke="#ef4444" stroke-width="2" opacity="0.7"/>

    <!-- 箭头 -->
    <path d="M 340 30 L 380 30 M 372 22 L 380 30 L 372 38" stroke="#2da44e" stroke-width="2" fill="none"/>

    <!-- 单色（正确） -->
    <rect x="400" y="0" width="60" height="60" fill="#2da44e"/>
    <text x="430" y="38" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="600" fill="#0a0e0c" text-anchor="middle">OK</text>

    <text x="0" y="100" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#7d8590">5 AI design tells, killed by method.</text>
  </g>

  <!-- 右侧标题区 -->
  <g transform="translate(80, 100)">
    <text font-family="-apple-system, system-ui, sans-serif" font-size="18" fill="#2da44e" font-weight="500" letter-spacing="2">METHODOLOGY SKILL</text>
    <text y="80" font-family="-apple-system, system-ui, sans-serif" font-size="64" font-weight="700" fill="#ffffff" letter-spacing="-1.5">Frontend Design</text>
    <text y="150" font-family="-apple-system, system-ui, sans-serif" font-size="64" font-weight="700" fill="#ffffff" letter-spacing="-1.5">Research</text>
    <text y="200" font-family="-apple-system, system-ui, sans-serif" font-size="22" fill="#c9d1d9" font-weight="400">前端设计调研方法论 · Anti-AI-tell</text>
  </g>

  <!-- 右下角：多平台标签 -->
  <g transform="translate(880, 380)" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#7d8590">
    <rect x="0" y="0" width="100" height="26" rx="13" fill="#161b22" stroke="#30363d"/>
    <text x="50" y="17" text-anchor="middle" fill="#c9d1d9">Claude Code</text>

    <rect x="110" y="0" width="70" height="26" rx="13" fill="#161b22" stroke="#30363d"/>
    <text x="145" y="17" text-anchor="middle" fill="#c9d1d9">Codex</text>

    <rect x="190" y="0" width="70" height="26" rx="13" fill="#161b22" stroke="#30363d"/>
    <text x="225" y="17" text-anchor="middle" fill="#c9d1d9">Cursor</text>

    <rect x="270" y="0" width="60" height="26" rx="13" fill="#161b22" stroke="#30363d"/>
    <text x="300" y="17" text-anchor="middle" fill="#c9d1d9">more</text>
  </g>
</svg>
